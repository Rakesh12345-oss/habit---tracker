<!DOCTYPE html>
<html>
<head>
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="login-box">

        <h2>My Habits ✅</h2>

        <!-- Add Habit Form -->
        <form method="POST">
            <div class="input-box">
                <input type="text" name="habit" required>
                <label>Add new habit</label>
            </div>
            <button type="submit">Add Habit</button>
        </form>

        <!-- Habit List -->
        <ul style="margin-top:20px; text-align:left;">
            {% for habit in habits %}
                <li style="margin:10px 0;">
                    {{ habit }}
                    <a href="/delete/{{ loop.index0 }}" style="color:red; float:right;">❌</a>
                </li>
            {% else %}
                <li>No habits yet</li>
            {% endfor %}
        </ul>

        <!-- Logout -->
        <a href="/logout" style="display:block; margin-top:20px; color:#667eea;">
            Logout
        </a>

    </div>
<div class="dashboard">
    <h3> streak: 5 days </h3>
    <p> completed: 3 / 5 </p>
</div>
<div class="habit-card">
    <h4>Drink Water</h4>
    <p>Streak: 3 days</p>
    <p>Completed: 2 / 3</p>
</div>
<div class="habit-card">
    <h4>Exercise</h4>
    <p>Streak: 2 days</p>
    <p>Completed: 1 / 2</p>
</div>
<div class="progress">
    <div class="progress-bar" style="width: 60%;"></div>
</div>

</body>
</html>
<script>
let streak = localStorage.getItem("streak") || 0;
let lastDate = localStorage.getItem("lastDate");

document.getElementById("streak").innerText = streak;

function markDone() {
    let today = new Date().toDateString();

    if (lastDate === today) {
        alert("Already marked today!");
        return;
    }

    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);

    if (lastDate === yesterday.toDateString()) {
        streak++;
    } else {
        streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDate", today);

    document.getElementById("streak").innerText = streak;
}
</script>
<div style="background:#ddd; width:100%; border-radius:10px;">
  <div style="width:60%; background:green; color:white; padding:5px;">
    60% Done
  </div>
</div>
<button onclick="toggleMode()">🌙 Mode</button>
<script>
function suggestHabit() {
  const habits = [
    "Drink Water 💧",
    "Exercise 🏃",
    "Read 10 pages 📖",
    "Meditate 🧘",
    "No phone for 1 hour 📵"
  ];

  const random = habits[Math.floor(Math.random() * habits.length)];
  document.getElementById("suggestion").innerText = random;

}
<button onclick="suggestHabit()">💡 Suggest Habit</button>
<p id="suggestion"></p>
</script>
<div class="container">
  <button onclick="suggestHabit()">💡 Suggest Habit</button>
  <p id="suggestion"></p>
</div>

<script>
  // your function here
</script>
</body>
</html>
