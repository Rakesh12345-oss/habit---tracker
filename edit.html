{% extends "layout.html" %}

{% block title %}Edit Habit{% endblock %}

{% block content %}
<section class="panel auth-panel">
  <h1>Edit Habit</h1>
  <form action="{{ url_for('edit_habit', habit_id=habit['id']) }}" method="post" class="auth-form">
    <label>
      Habit name
      <input type="text" name="name" value="{{ habit['name'] }}" required>
    </label>
    <label>
      Habit type
      <select name="habit_type">
        <option value="good" {% if habit['habit_type'] in ('good', None) %}selected{% endif %}>Good Habit (to do)</option>
        <option value="bad" {% if habit['habit_type'] == 'bad' %}selected{% endif %}>Bad Habit (to avoid)</option>
      </select>
    </label>
    <label>
      Target frequency
      <select name="target_frequency">
        <option value="Daily" {% if habit['target_frequency'] == 'Daily' %}selected{% endif %}>Daily</option>
        <option value="Weekly" {% if habit['target_frequency'] == 'Weekly' %}selected{% endif %}>Weekly</option>
        <option value="Monthly" {% if habit['target_frequency'] == 'Monthly' %}selected{% endif %}>Monthly</option>
      </select>
    </label>
    <label>
      Reminder
      <input type="text" name="reminder" value="{{ habit['reminder'] }}" placeholder="Reminder time e.g. 8:00 AM">
    </label>
    <label>
      Status
      <select name="status">
        <option value="Not Done" {% if habit['status'] != 'Done' %}selected{% endif %}>Not Done</option>
        <option value="Done" {% if habit['status'] == 'Done' %}selected{% endif %}>Done</option>
      </select>
    </label>
    <button class="button" type="submit">Save changes</button>
  </form>
  <p class="form-note"><a href="{{ url_for('home') }}">Back to habits</a></p>
</section>
{% endblock %}
