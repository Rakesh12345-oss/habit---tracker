<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        h1{
            color: #1e3c72;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        input:focus {
            border-color: #2a5298;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            border: 16px;
        }

        a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
<h1>Register</h1>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Register</button>
</form>

<p>Already have account? <a href="/login">Login</a></p>
</div>
</body>
</html>
